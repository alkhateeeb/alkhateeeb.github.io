<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark amber rounded background -->
  <rect width="32" height="32" rx="7" fill="#78350f"/>

  <!-- Left wing -->
  <ellipse cx="10" cy="12.5" rx="5.5" ry="3.3"
           fill="#c7d2fe" opacity="0.9"
           transform="rotate(-22,10,12.5)"/>
  <!-- Right wing -->
  <ellipse cx="22" cy="12.5" rx="5.5" ry="3.3"
           fill="#c7d2fe" opacity="0.9"
           transform="rotate(22,22,12.5)"/>

  <!-- Body -->
  <ellipse cx="16" cy="21.5" rx="6.5" ry="5.5" fill="#fbbf24"/>

  <!-- Black stripe -->
  <path d="M9.8,20 Q16,18 22.2,20 L22.2,23 Q16,25 9.8,23 Z" fill="#1c1917"/>

  <!-- Body tip -->
  <ellipse cx="16" cy="26.5" rx="4.5" ry="2" fill="#f59e0b"/>

  <!-- Head -->
  <circle cx="16" cy="13.5" r="4" fill="#fbbf24"/>

  <!-- Eyes -->
  <circle cx="14.3" cy="13" r="1" fill="#1c1917"/>
  <circle cx="17.7" cy="13" r="1" fill="#1c1917"/>

  <!-- Left antenna stem -->
  <line x1="14" y1="10.5" x2="11.5" y2="7"
        stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="11" cy="6.5" r="1.8" fill="#fbbf24"/>

  <!-- Right antenna stem -->
  <line x1="18" y1="10.5" x2="20.5" y2="7"
        stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="21" cy="6.5" r="1.8" fill="#fbbf24"/>
</svg>
